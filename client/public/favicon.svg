<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <text x="32" y="30" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="22" fill="url(#g)" filter="url(#glow)">CC</text>
  <!-- 3x3 mini grid -->
  <g stroke="url(#g)" stroke-width="1.5" fill="none" opacity="0.6">
    <rect x="17" y="36" width="7" height="7" rx="1.5"/>
    <rect x="28.5" y="36" width="7" height="7" rx="1.5"/>
    <rect x="40" y="36" width="7" height="7" rx="1.5"/>
    <rect x="17" y="47" width="7" height="7" rx="1.5"/>
    <rect x="28.5" y="47" width="7" height="7" rx="1.5"/>
    <rect x="40" y="47" width="7" height="7" rx="1.5"/>
  </g>
  <!-- strike lines -->
  <line x1="18" y1="39.5" x2="46" y2="39.5" stroke="#f43f5e" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="18" y1="50.5" x2="46" y2="50.5" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
</svg>